<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pixel Art Maker</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="./index.js" defer></script>
  </head>
  <body>
    <main>
      <div id="navbar">
        <span id="titleText">PixelArt Gen</span>
        <span id="toolbar"
          ><input id="colorPicker" type="color" />
          <input id="sizePicker" type="range" min="16" max="64" step="8" />
          <button id="resetButton" onclick="reset()">Reset</button></span
        >
        <span id="export">
          <button id="downloadButton" onclick="download()">Export</button></span
        </span>
      </div>

      <div id="canvas"></div>
    </main>
  </body>
</html>
